<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>OmniStat Live Dashboard</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/microsoft-signalr/6.0.1/signalr.min.js"></script>
<style>
    /* Reset and Layout */
    body { 
        background: #0f0f0f; 
        color: white; 
        font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
        margin: 0; 
        padding: 40px;
        display: flex; 
        flex-direction: column; 
        align-items: center; 
        min-height: 100vh;
    }

    /* The Container: Now a flexible grid */
    #scoreboard { 
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
        gap: 25px;
        width: 100%;
        max-width: 1300px;
        margin-top: 20px;
    }

    /* Individual Game Cards */
    .game-card { 
        background: #1a1a1a; 
        padding: 25px; 
        border-radius: 20px; 
        border: 1px solid #333; 
        text-align: center; 
        box-shadow: 0 8px 24px rgba(0,0,0,0.4);
        transition: transform 0.2s ease, border-color 0.2s ease;
    }

    .game-card:hover {
        transform: translateY(-5px);
        border-color: #00ff88;
    }

    /* Team Layout */
    .team-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin: 10px 0;
    }

    .logo {
        width: 60px;
        height: 60px;
        object-fit: contain;
        filter: drop-shadow(0 4px 8px rgba(0,0,0,0.5));
    }

    .team-name {
        font-size: 1.3rem;
        font-weight: 700;
        letter-spacing: 0.5px;
    }

    /* Score Styling */
    .score-display { 
        font-size: 2.8rem; 
        font-weight: 900; 
        margin: 15px 0; 
        color: #fff;
        background: #252525;
        border-radius: 10px;
        padding: 10px 0;
        font-family: 'Courier New', monospace;
    }

    /* Meta Info */
    .status-bar { 
        color: #aaa; 
        text-transform: uppercase; 
        font-size: 0.85rem; 
        font-weight: 600;
        margin-top: 15px;
        padding-top: 15px;
        border-top: 1px solid #333;
    }

    .live-tag { 
        color: #ff4d4d; 
        font-weight: bold; 
        animation: blink 1.5s infinite; 
        font-size: 1.1rem;
        margin-bottom: 20px;
        text-align: center;
    }

    @keyframes blink { 50% { opacity: 0.3; } }
</style>
</head>
<body>
    <div id="scoreboard">
        <div class="live-tag">● OMNISTAT ARBITER INITIALIZING</div>
    </div>

<script>
    const connection = new signalR.HubConnectionBuilder()
        .withUrl("http://localhost:5116/scoreHub")
        .withAutomaticReconnect()
        .build();

    // Helper to get Logos using a robust mapping from team name to CDN slug.
    const getLogoUrl = (teamName) => {
        const teamMap = {
            "MAGIC": "orlando-magic",
            "HAWKS": "atlanta-hawks",
            "WARRIORS": "golden-state-warriors",
            "WIZARDS": "washington-wizards",
            "SUNS": "phoenix-suns",
            "CELTICS": "boston-celtics",
            "GRIZZLIES": "memphis-grizzlies",
            "BULLS": "chicago-bulls",
            "NETS": "brooklyn-nets",
            "TRAIL BLAZERS": "portland-trail-blazers",
            "MAVERICKS": "dallas-mavericks",
            "LAKERS": "los-angeles-lakers",
            "SPURS": "san-antonio-spurs"
        };

        const slug = teamMap[teamName.toUpperCase()] || teamName.toLowerCase();
        return `https://loodibee.com/wp-content/uploads/nba-${slug}-logo-300x300.png`;
    };

    connection.on("ReceiveScore", (message) => {
        const payload = JSON.parse(message);
        const games = payload.LiveScores;
        const odds = payload.MarketOdds || [];
        
        const container = document.getElementById("scoreboard");
        container.innerHTML = '<div class="live-tag">● OMNISTAT ARBITER ACTIVE</div>';

        games.forEach(game => {
            // 1. Find matching odds for this game
            const gameOdds = odds.find(o => 
                o.home_team.toUpperCase().includes(game.home.toUpperCase()) || 
                o.away_team.toUpperCase().includes(game.away.toUpperCase())
            );

            // 2. Extract the Spread (e.g., -5.5)
            const spread = gameOdds?.bookmakers?.[0]?.markets
                ?.find(m => m.key === 'spreads')?.outcomes
                ?.find(out => out.name.toUpperCase().includes(game.home.toUpperCase()))?.point || 0;

            // 3. Simple Arb Logic: Is the underdog winning?
            const scores = game.score.split(' - ').map(Number); // [Away, Home]
            const isUnderdogWinning = (spread > 0 && scores[1] > scores[0]) || (spread < 0 && scores[0] > scores[1]);
            
            // 4. Calculate "Arb Glow" - If the point gap is > 5 from the spread
            const arbAlert = isUnderdogWinning && Math.abs(scores[0] - scores[1]) > 5;

            const gameHtml = `
                <div class="game-card" style="${arbAlert ? 'border: 2px solid #00ff88; box-shadow: 0 0 20px rgba(0,255,136,0.4);' : ''}">
                    <div class="team-row">
                        <img src="${getLogoUrl(game.away)}" class="logo" onerror="this.src='https://via.placeholder.com/50?text=NBA'">
                        <span class="team-name">${game.away}</span>
                    </div>
                    <div class="score-display">${game.score}</div>
                    <div class="team-row">
                        <img src="${getLogoUrl(game.home)}" class="logo" onerror="this.src='https://via.placeholder.com/50?text=NBA'">
                        <span class="team-name">${game.home}</span>
                    </div>
                    <div class="status-bar">
                        ${spread !== 0 ? `LINE: ${spread > 0 ? '+' : ''}${spread}` : 'NO LINE'} | ${game.status}
                    </div>
                    ${arbAlert ? '<div style="color: #00ff88; font-size: 0.7rem; font-weight: bold; margin-top: 5px;">⚠️ HIGH VALUE OPPORTUNITY</div>' : ''}
                </div>
            `;
            container.insertAdjacentHTML('beforeend', gameHtml);
        });
    });

    connection.start().catch(err => console.error(err));
</script>
</body>
</html>
