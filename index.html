<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>OmniStat Live Dashboard</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/microsoft-signalr/6.0.1/signalr.min.js"></script>
<style>
    /* Reset and Layout */
    body { 
        background: #0f0f0f; 
        color: white; 
        font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
        margin: 0; 
        padding: 40px;
        display: flex; 
        flex-direction: column; 
        align-items: center; 
        min-height: 100vh;
    }

    /* The Container: Now a flexible grid */
    #scoreboard { 
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
        gap: 25px;
        width: 100%;
        max-width: 1300px;
        margin-top: 20px;
    }

    /* Individual Game Cards */
    .game-card { 
        background: #1a1a1a; 
        padding: 25px; 
        border-radius: 20px; 
        border: 1px solid #333; 
        text-align: center; 
        box-shadow: 0 8px 24px rgba(0,0,0,0.4);
        transition: transform 0.2s ease, border-color 0.2s ease;
    }

    .game-card:hover {
        transform: translateY(-5px);
        border-color: #00ff88;
    }

    /* Team Layout */
    .team-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin: 10px 0;
    }

    .logo {
        width: 60px;
        height: 60px;
        object-fit: contain;
        filter: drop-shadow(0 4px 8px rgba(0,0,0,0.5));
    }

    .team-name {
        font-size: 1.3rem;
        font-weight: 700;
        letter-spacing: 0.5px;
    }

    /* Score Styling */
    .score-display { 
        font-size: 2.8rem; 
        font-weight: 900; 
        margin: 15px 0; 
        color: #fff;
        background: #252525;
        border-radius: 10px;
        padding: 10px 0;
        font-family: 'Courier New', monospace;
    }

    /* Meta Info */
    .status-bar { 
        color: #aaa; 
        text-transform: uppercase; 
        font-size: 0.85rem; 
        font-weight: 600;
        margin-top: 15px;
        padding-top: 15px;
        border-top: 1px solid #333;
    }

    .live-tag { 
        color: #ff4d4d; 
        font-weight: bold; 
        animation: blink 1.5s infinite; 
        font-size: 1.1rem;
        margin-bottom: 20px;
        text-align: center;
    }

    @keyframes blink { 50% { opacity: 0.3; } }
</style>
</head>
<body>
    <div id="scoreboard">
        <div class="live-tag">● OMNISTAT ARBITER INITIALIZING</div>
    </div>

    <div id="history-panel" style="margin-top: 50px; width: 90%; max-width: 1300px; background: #1a1a1a; padding: 20px; border-radius: 15px; border: 1px solid #333;">
        <h3 style="color: #00ff88; margin-top: 0;">🏆 HISTORICAL VALUE ALERTS</h3>
        <table id="history-table" style="width: 100%; color: #aaa; text-align: left; border-collapse: collapse;">
            <thead>
                <tr style="border-bottom: 1px solid #333;">
                    <th style="padding: 10px;">TIME</th>
                    <th>MATCHUP</th>
                    <th>VALUE</th>
                </tr>
            </thead>
            <tbody id="history-body">
            </tbody>
        </table>
    </div>

<script>
    const connection = new signalR.HubConnectionBuilder()
        .withUrl("http://localhost:5116/scoreHub")
        .withAutomaticReconnect()
        .build();

    const API_BASE = "http://localhost:5116";

    // Official NBA CDN team ids (fallback when Loodibee filename differs)
    const TEAM_NBA_ID = {
        "HAWKS": "1610612737", "CELTICS": "1610612738", "NETS": "1610612751", "HORNETS": "1610612766",
        "BULLS": "1610612741", "CAVALIERS": "1610612739", "MAVERICKS": "1610612742", "NUGGETS": "1610612743",
        "PISTONS": "1610612765", "WARRIORS": "1610612744", "ROCKETS": "1610612745", "PACERS": "1610612754",
        "CLIPPERS": "1610612746", "LAKERS": "1610612747", "GRIZZLIES": "1610612763", "HEAT": "1610612748",
        "BUCKS": "1610612749", "TIMBERWOLVES": "1610612750", "PELICANS": "1610612740", "KNICKS": "1610612752",
        "THUNDER": "1610612760", "MAGIC": "1610612753", "76ERS": "1610612755", "SIXERS": "1610612755",
        "SUNS": "1610612756", "BLAZERS": "1610612757", "TRAIL BLAZERS": "1610612757", "KINGS": "1610612758",
        "SPURS": "1610612759", "RAPTORS": "1610612761", "JAZZ": "1610612762", "WIZARDS": "1610612764"
    };

    const LOODIBEE_SLUG = {
        "76ERS": "philadelphia-76ers", "SIXERS": "philadelphia-76ers", "BUCKS": "milwaukee-bucks",
        "BULLS": "chicago-bulls", "CAVALIERS": "cleveland-cavaliers", "CELTICS": "boston-celtics",
        "CLIPPERS": "los-angeles-clippers", "GRIZZLIES": "memphis-grizzlies", "HAWKS": "atlanta-hawks",
        "HEAT": "miami-heat", "HORNETS": "charlotte-hornets", "JAZZ": "utah-jazz", "KINGS": "sacramento-kings",
        "KNICKS": "new-york-knicks", "LAKERS": "los-angeles-lakers", "MAGIC": "orlando-magic",
        "MAVERICKS": "dallas-mavericks", "NETS": "brooklyn-nets", "NUGGETS": "denver-nuggets",
        "PACERS": "indiana-pacers", "PELICANS": "new-orleans-pelicans", "PISTONS": "detroit-pistons",
        "RAPTORS": "toronto-raptors", "ROCKETS": "houston-rockets", "SPURS": "san-antonio-spurs",
        "SUNS": "phoenix-suns", "THUNDER": "oklahoma-city-thunder", "TIMBERWOLVES": "minnesota-timberwolves",
        "TRAIL BLAZERS": "portland-trail-blazers", "BLAZERS": "portland-trail-blazers",
        "WARRIORS": "golden-state-warriors", "WIZARDS": "washington-wizards"
    };

    function resolveTeamKeys(teamName) {
        const u = teamName.toUpperCase().trim();
        const parts = u.split(/\s+/).filter(Boolean);
        const keys = new Set([u]);
        if (parts.length) keys.add(parts[parts.length - 1]);
        if (parts.length >= 2) keys.add(parts.slice(-2).join(" "));
        return [...keys];
    }

    function resolveNbaTeamId(teamName) {
        for (const key of resolveTeamKeys(teamName)) {
            if (TEAM_NBA_ID[key]) return TEAM_NBA_ID[key];
        }
        return null;
    }

    function getLogoUrl(teamName) {
        for (const key of resolveTeamKeys(teamName)) {
            if (LOODIBEE_SLUG[key]) {
                return `https://loodibee.com/wp-content/uploads/nba-${LOODIBEE_SLUG[key]}-logo-300x300.png`;
            }
        }
        const slug = teamName.toLowerCase().trim().replace(/\s+/g, "-");
        return `https://loodibee.com/wp-content/uploads/nba-${slug}-logo-300x300.png`;
    }

    function logoImgHtml(teamName) {
        const primary = getLogoUrl(teamName);
        const nbaId = resolveNbaTeamId(teamName);
        const placeholder = "https://via.placeholder.com/50?text=NBA";
        if (nbaId) {
            const nbaUrl = `https://cdn.nba.com/logos/nba/${nbaId}/primary/L/logo.svg`;
            return `<img src="${primary}" class="logo" alt="" onerror="if(!this.dataset.nba){this.dataset.nba=1;this.src='${nbaUrl}';}else{this.onerror=null;this.src='${placeholder}';}">`;
        }
        return `<img src="${primary}" class="logo" alt="" onerror="this.onerror=null;this.src='${placeholder}'">`;
    }

    async function loadHistory() {
        try {
            const response = await fetch(`${API_BASE}/api/history`);
            const data = await response.json();
            const tbody = document.getElementById("history-body");
            if (!tbody) return;

            tbody.innerHTML = "";

            if (!Array.isArray(data) || data.length === 0) {
                tbody.insertAdjacentHTML(
                    "beforeend",
                    `<tr>
                        <td colspan="3" style="padding: 12px; color: #666; text-align:center;">
                            Waiting for rare feats (50+ PTS, 20+ REB, 15+ AST).
                        </td>
                    </tr>`
                );
                return;
            }

            data.forEach(item => {
                const valueText = item?.Value ?? "";
                const type = (item?.Type || (valueText.includes("PTS") ? "PTS" : valueText.includes("REB") ? "REB" : valueText.includes("AST") ? "AST" : "VALUE")).toUpperCase();
                const badgeColor = type === "PTS"
                    ? "#ff5e5e"
                    : type === "REB"
                        ? "#4ea8ff"
                        : type === "AST"
                            ? "#b57bff"
                            : "#00ff88";
                const row = `
                    <tr style="border-bottom: 1px solid #222;">
                        <td style="padding: 10px; color: #00ff88;">${item?.Time ?? ""}</td>
                        <td>${item?.Game ?? ""}</td>
                        <td style="font-weight: bold; color: white;">
                            <span style="display:inline-block;padding:2px 8px;border-radius:999px;background:${badgeColor};color:#0f0f0f;font-weight:900;font-size:0.72rem;letter-spacing:0.5px;margin-right:8px;">${type}</span>
                            ${valueText}
                        </td>
                    </tr>`;
                tbody.insertAdjacentHTML('beforeend', row);
            });
        } catch (err) {
            console.error("Failed to load history:", err);
        }
    }

    // Call it when the page loads
    loadHistory();

    connection.on("ReceiveScore", (message) => {
        const payload = JSON.parse(message);
        const games = Array.isArray(payload.LiveScores) ? payload.LiveScores : [];
        const odds = payload.MarketOdds || [];
        const history = payload.History || [];
        const kind = payload.TriggeredBy || "scores";
        
        const container = document.getElementById("scoreboard");
        container.innerHTML = `<div class="live-tag">● OMNISTAT ARBITER ACTIVE <span style="opacity:0.85;font-size:0.85rem;font-weight:600;">— last push: <span style="color:#00ff88;">${kind}</span> @ ${payload.Timestamp || ""}</span></div><div style="grid-column:1/-1;text-align:center;color:#888;font-size:0.75rem;margin-bottom:8px;">Odds refresh on their own schedule (API lines often look static until books move).</div>`;

        // Every time we get a score update, refresh the history table
        const fetchHistory = async () => {
            const body = document.getElementById("history-body");
            if (!body) return;
            body.innerHTML = "";

            if (!Array.isArray(history) || history.length === 0) {
                body.insertAdjacentHTML(
                    "beforeend",
                    `<tr>
                        <td colspan="3" style="padding: 12px; color: #666; text-align:center;">
                            Waiting for rare feats (50+ PTS, 20+ REB, 15+ AST).
                        </td>
                    </tr>`
                );
                return;
            }

            history.forEach(item => {
                const time = item?.Time || "";
                const game = item?.Game || "";
                const value = item?.Value || "";
                const type = (item?.Type || (value.includes("PTS") ? "PTS" : value.includes("REB") ? "REB" : value.includes("AST") ? "AST" : "VALUE")).toUpperCase();
                const badgeColor = type === "PTS"
                    ? "#ff5e5e"
                    : type === "REB"
                        ? "#4ea8ff"
                        : type === "AST"
                            ? "#b57bff"
                            : "#00ff88";
                body.insertAdjacentHTML(
                    "beforeend",
                    `<tr style="border-bottom: 1px solid #2a2a2a;">
                        <td style="padding: 10px; font-family: monospace;">${time}</td>
                        <td>${game}</td>
                        <td style="color: #00ff88; font-weight: 700;">
                            <span style="display:inline-block;padding:2px 8px;border-radius:999px;background:${badgeColor};color:#0f0f0f;font-weight:900;font-size:0.72rem;letter-spacing:0.5px;margin-right:8px;">${type}</span>
                            ${value}
                        </td>
                    </tr>`
                );
            });
        };

        fetchHistory();

        games.forEach(game => {
            // 1. Find matching odds for this game
            const gameOdds = odds.find(o => 
                o.home_team.toUpperCase().includes(game.home.toUpperCase()) || 
                o.away_team.toUpperCase().includes(game.away.toUpperCase())
            );

            // 2. Extract the Home Spread (e.g., -5.5)
            const homeSpread = gameOdds?.bookmakers?.[0]?.markets
                ?.find(m => m.key === 'spreads')?.outcomes
                ?.find(out => out.name.toUpperCase().includes(game.home.toUpperCase()))?.point || 0;

            // 3. Simple Arb Logic: Is the underdog winning?
            const scores = game.score.split(' - ').map(Number); // [Away, Home]
            const isUnderdogWinning = (homeSpread > 0 && scores[1] > scores[0]) || (homeSpread < 0 && scores[0] > scores[1]);
            
            // 4. Calculate "Arb Glow" - If the point gap is > 5 from the spread
            const arbAlert = isUnderdogWinning && Math.abs(scores[0] - scores[1]) > 5;

            // 5. Win probability (transparent heuristic, not a sportsbook model):
            // - Spread convention: homeSpread < 0 => home is favorite (lays points).
            // - Prior: logit(P_home) shifts with the line so favorites start >50% before tip.
            // - Live: add a margin term so the probability moves as the score changes.
            const homeScore = scores[1];
            const awayScore = scores[0];
            const marginHome = homeScore - awayScore; // home - away
            const sigmoid = (x) => 1 / (1 + Math.exp(-x));
            const clampProb = (p) => Math.max(0.03, Math.min(0.97, p));
            const LINE_K = 0.055;   // softer line → avoids wild pregame % (tune: ~0.04–0.07)
            const MARGIN_K = 0.065; // how fast score moves the needle (per point of margin)
            let logit;
            if (homeSpread === 0) {
                logit = MARGIN_K * marginHome; // no line: drift from 50/50 with score only
            } else {
                // Correct sign: favorite (negative homeSpread) => positive logit contribution
                logit = -LINE_K * homeSpread + MARGIN_K * marginHome;
            }
            const pHome = clampProb(sigmoid(logit));
            const pAway = 1 - pHome;
            const pHomePct = Math.round(pHome * 100);
            const pAwayPct = 100 - pHomePct;
            const probLabel = `MODEL P(WIN): ${game.home} ${pHomePct}% | ${game.away} ${pAwayPct}% <span style="color:#666;font-weight:600;font-size:0.72rem;">(line prior + margin)</span>`;

            // 6. Make the line more explicit: who is favorite/underdog?
            let lineLabel = "NO LINE";
            if (homeSpread !== 0) {
                const favTeam = homeSpread < 0 ? game.home : game.away;
                const favSpread = homeSpread < 0 ? homeSpread : -homeSpread; // show negative for favorite
                const underTeam = homeSpread < 0 ? game.away : game.home;
                const underSpread = -favSpread;

                const badgeStyleFav = "display:inline-block;padding:2px 8px;border-radius:999px;background:#00ff88;color:#0f0f0f;font-weight:800;letter-spacing:0.6px;font-size:0.72rem;";
                const badgeStyleUnd = "display:inline-block;padding:2px 8px;border-radius:999px;background:#333;color:#ddd;font-weight:800;letter-spacing:0.6px;font-size:0.72rem;margin-left:8px;";

                lineLabel = `
                    <span style="${badgeStyleFav}">FAV</span>
                    <span style="margin-left:8px;color:#fff;font-weight:800;">${favTeam}</span>
                    <span style="margin-left:6px;font-family:monospace;color:#ddd;">${favSpread > 0 ? '+' : ''}${favSpread}</span>
                    <span style="${badgeStyleUnd}">UND</span>
                    <span style="margin-left:8px;color:#fff;font-weight:700;">${underTeam}</span>
                    <span style="margin-left:6px;font-family:monospace;color:#aaa;">${underSpread > 0 ? '+' : ''}${underSpread}</span>
                `;
            }

            const gameHtml = `
                <div class="game-card" style="${arbAlert ? 'border: 2px solid #00ff88; box-shadow: 0 0 20px rgba(0,255,136,0.4);' : ''}">
                    <div class="team-row">
                        ${logoImgHtml(game.away)}
                        <span class="team-name">${game.away}</span>
                    </div>
                    <div class="score-display">${game.score}</div>
                    <div class="team-row">
                        ${logoImgHtml(game.home)}
                        <span class="team-name">${game.home}</span>
                    </div>
                    <div class="status-bar">
                        <span style="display:block;color:#bbb;margin-bottom:6px;">${game.status}</span>
                        <span style="display:block;">${lineLabel}</span>
                        <span style="display:block;margin-top:6px;color:#ddd;font-weight:800;font-size:0.85rem;">${probLabel}</span>
                    </div>
                    ${arbAlert ? '<div style="color: #00ff88; font-size: 0.7rem; font-weight: bold; margin-top: 5px;">⚠️ HIGH VALUE OPPORTUNITY</div>' : ''}
                </div>
            `;
            container.insertAdjacentHTML('beforeend', gameHtml);
        });
    });

    connection.start().catch(err => console.error(err));
</script>
</body>
</html>
